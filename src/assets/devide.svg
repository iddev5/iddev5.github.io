<svg width="200" height="200" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes dash1{0%,10%{stroke-dashoffset:110}55%,100%{stroke-dashoffset:0}}
    @keyframes dash2{0%,22%{stroke-dashoffset:80}65%,100%{stroke-dashoffset:0}}
    @keyframes dash3{0%,34%{stroke-dashoffset:130}74%,100%{stroke-dashoffset:0}}
    @keyframes dash4{0%,45%{stroke-dashoffset:55}82%,100%{stroke-dashoffset:0}}
    @keyframes dash5{0%,55%{stroke-dashoffset:95}88%,100%{stroke-dashoffset:0}}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    @media(prefers-reduced-motion:no-preference){
      .l1{stroke-dasharray:110;stroke-dashoffset:110;animation:dash1 3s ease-out infinite}
      .l2{stroke-dasharray:80;stroke-dashoffset:80;animation:dash2 3s ease-out infinite}
      .l3{stroke-dasharray:130;stroke-dashoffset:130;animation:dash3 3s ease-out infinite}
      .l4{stroke-dasharray:55;stroke-dashoffset:55;animation:dash4 3s ease-out infinite}
      .l5{stroke-dasharray:95;stroke-dashoffset:95;animation:dash5 3s ease-out infinite}
      .cur{animation:blink 1.1s step-end infinite}
    }
  </style>
</defs>

<rect x="60" y="60" width="280" height="280" rx="28" fill="none" stroke="#ffffff" stroke-width="2.5"/>
<line x1="60" y1="118" x2="340" y2="118" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.25"/>
<circle cx="90" cy="89" r="6" fill="none" stroke="#ffffff" stroke-width="2"/>
<circle cx="112" cy="89" r="6" fill="none" stroke="#ffffff" stroke-width="2"/>
<circle cx="134" cy="89" r="6" fill="none" stroke="#ffffff" stroke-width="2"/>

<line class="l1" x1="88" y1="152" x2="198" y2="152" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
<line class="l2" x1="108" y1="176" x2="188" y2="176" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.7"/>
<line class="l3" x1="108" y1="200" x2="238" y2="200" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.7"/>
<line class="l4" x1="108" y1="224" x2="163" y2="224" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.5"/>
<line class="l5" x1="88" y1="248" x2="183" y2="248" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.5"/>

<rect class="cur" x="246" y="192" width="3" height="18" rx="1" fill="#ffffff"/>

<path d="M112 298 L96 314 L112 330" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M168 298 L184 314 L168 330" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<line x1="130" y1="314" x2="150" y2="314" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-opacity="0.5"/>
</svg>
